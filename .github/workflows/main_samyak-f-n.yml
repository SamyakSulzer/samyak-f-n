name: Build and deploy Node.js app to Azure Web App - samyak-f-n

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          
      # --- CHANGE 1: Move static files into the standalone folder ---
      - name: Copy static files to standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      # --- CHANGE 2: Upload ONLY the standalone folder (the "finished cookies") ---
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

  steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    - name: Install and Build
      run: |
        npm install
        npm run build

    - name: Prepare Clean Deployment Folder
      run: |
        # 1. Create a fresh temp directory
        mkdir -p ./deploy_package
        
        # 2. Copy the standalone files (includes server.js and a tiny node_modules)
        cp -r .next/standalone/. ./deploy_package/
        
        # 3. Copy the critical static build folder (THIS WAS MISSING)
        mkdir -p ./deploy_package/.next/static
        cp -r .next/static/. ./deploy_package/.next/static/
        
        # 4. Copy the public assets
        cp -r public/. ./deploy_package/public/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: node-app
        path: ./deploy_package/ # This ensures ONLY the contents of this folder go to Azure