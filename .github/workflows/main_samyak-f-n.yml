name: Build and deploy Next.js app to Azure Web App - samyak-f-n

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Organize Standalone Bundle
        run: |
          # 1. Create a clean staging area
          mkdir -p ./deploy_package
          
          # 2. Copy the standalone engine (includes server.js)
          cp -r .next/standalone/. ./deploy_package/
          
          # 3. Copy static files (critical for Next.js to find the build)
          mkdir -p ./deploy_package/.next/static
          cp -r .next/static/. ./deploy_package/.next/static/
          
          # 4. Copy public assets
          cp -r public/. ./deploy_package/public/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./deploy_package/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A000B377EACE4040B45F1B3EEE1C4372 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_50E61459B98149FAB37E5C2B2F421BA7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_70C07A295CC14804B57D4E700558A63D }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'samyak-f-n'
          slot-name: 'Production'
          package: .