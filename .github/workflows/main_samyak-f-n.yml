name: Build and deploy Node.js app to Azure Web App - samyak-f-n

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          
      # --- CHANGE 1: Move static files into the standalone folder ---
      - name: Copy static files to standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      # --- CHANGE 2: Upload ONLY the standalone folder (the "finished cookies") ---
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Flatten Deployment Folder
        # We are moving EVERYTHING out of standalone and into the root
        # so server.js is sitting right next to .next
        run: |
          cp -r .next/standalone/. .
          cp -r public ./public
          cp -r .next/static ./.next/static

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .
          # This sends the root folder, which now has server.js and .next together