name: Build and deploy Next.js - Single Job

on:
  push:
    branches: [main]
  workflow_dispatch:


permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A000B377EACE4040B45F1B3EEE1C4372 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_50E61459B98149FAB37E5C2B2F421BA7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_70C07A295CC14804B57D4E700558A63D }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'samyak-f-n'
          # We deploy the WHOLE root (including node_modules and .next)
          # This is heavy, but it guarantees every file is present.
          package: .